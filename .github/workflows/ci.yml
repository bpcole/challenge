name: platform-checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y yamllint
          curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/
          curl -L https://github.com/kyverno/kyverno/releases/latest/download/kyverno-cli_v1.13.0_linux_x86_64.tar.gz | tar xz
          sudo mv kyverno /usr/local/bin/kyverno

      - name: YAML lint
        run: yamllint .

      - name: Helm template
        run: |
          helm template widget-api charts/widget-api > rendered.yaml

      - name: Kubeconform
        run: |
          kubeconform -strict -summary -ignore-missing-schemas rendered.yaml

      - name: Kyverno tests
        run: |
          kyverno test tests/kyverno

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/stefanprodan/podinfo:6.7.1
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload rendered manifests
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: rendered-manifests
          path: rendered.yaml