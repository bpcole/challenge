name: platform-checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: |
          sudo apt-get update
          sudo apt-get install -y yamllint

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION="v0.6.7"
          curl -LO https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz
          file kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/
          kubeconform -v

      - name: Install Kyverno CLI
        run: |
          KYVERNO_VERSION="v1.13.0"
          curl -LO https://github.com/kyverno/kyverno/releases/download/${KYVERNO_VERSION}/kyverno-cli_${KYVERNO_VERSION#v}_linux_x86_64.tar.gz
          file kyverno-cli_${KYVERNO_VERSION#v}_linux_x86_64.tar.gz
          tar -xzf kyverno-cli_${KYVERNO_VERSION#v}_linux_x86_64.tar.gz
          sudo mv kyverno /usr/local/bin/kyverno
          kyverno version

      - name: YAML lint
        run: yamllint .

      - name: Helm template
        run: |
          helm template widget-api charts/widget-api > rendered.yaml

      - name: Kubeconform
        run: |
          kubeconform -strict -summary -ignore-missing-schemas rendered.yaml

      - name: Kyverno tests
        run: |
          kyverno test tests/kyverno

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/stefanprodan/podinfo:6.7.1
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload rendered manifests
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: rendered-manifests
          path: rendered.yaml