apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-frontend-and-monitoring
  namespace: widget-api
spec:
  selector:
    matchLabels:
      app: widget-api
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
              - frontend
    - from:
        - source:
            namespaces:
              - monitoring